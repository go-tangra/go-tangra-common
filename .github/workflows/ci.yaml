name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'protos/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -race ./...

  buf-lint:
    name: Buf Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Buf lint
        uses: bufbuild/buf-lint-action@v1
        with:
          input: protos

  buf-breaking:
    name: Buf Breaking Change Detection
    runs-on: ubuntu-latest
    # Only run on pull requests
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Buf breaking change detection
        uses: bufbuild/buf-breaking-action@v1
        with:
          input: protos
          against: 'https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},subdir=protos'

  buf-push:
    name: Buf Push
    runs-on: ubuntu-latest
    # Only push on main/master branch, not on PRs
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs:
      - build-and-test
      - buf-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Buf push
        uses: bufbuild/buf-push-action@v1
        with:
          input: protos
          buf_token: ${{ secrets.BUF_TOKEN }}
