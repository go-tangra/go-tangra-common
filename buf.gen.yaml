version: v2

clean: true

managed:
  enabled: true

  disable:
    - module: buf.build/googleapis/googleapis
    - module: buf.build/menta2k-org/redact

  override:
    - file_option: go_package
      path: common/service/v1
      value: github.com/go-tangra/go-tangra-common/gen/go/common/service/v1;commonpb
    - file_option: go_package
      path: common/admin_stub/v1
      value: github.com/go-tangra/go-tangra-common/gen/go/common/admin_stub/v1;adminstubpb

plugins:
  # generate go code
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative

  # generate grpc service code
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative

  # generate redact code
  - local: protoc-gen-redact
    out: gen/go
    opt:
      - paths=source_relative
      - lang=go
